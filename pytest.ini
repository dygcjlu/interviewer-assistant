[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: 纯逻辑单元测试，无 I/O
    integration: API 契约集成测试，Mock LLM
    e2e: 端到端测试，真实服务器 + 真实 LLM
    windows_only: 依赖 Windows WASAPI/pyaudiowpatch，只在 windows runner 运行
addopts = -v --tb=short
